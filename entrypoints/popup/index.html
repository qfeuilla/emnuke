<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>emnuke</title>
    <meta name="manifest.type" content="browser_action" />
  </head>
  <body>
    <div class="container">
      <h1><img src="/icon/icon.svg" class="header-icon" alt="emnuke"> emnuke</h1>
      <p class="tagline">Purging em dashes from the web</p>
      <div class="default-toggle">
        <span class="default-label">Active by default</span>
        <label class="switch">
          <input type="checkbox" id="default-active" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="counter">
        <span id="count">0</span>
        <span class="label">blocks nuked</span>
      </div>
<div class="mode-selector">
        <button class="mode-btn active" data-mode="nuke"><img src="/icon/icon.svg" class="btn-icon" alt=""> Nuke</button>
        <button class="mode-btn" data-mode="highlight">🔍 Highlight</button>
        <button class="mode-btn" data-mode="filter">🔇 Filter</button>
        <button class="mode-btn" data-mode="off">💤 Off</button>
      </div>
      <button id="exclude-btn" class="exclude-btn" style="display: none;"></button>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
