name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Sync version from git tag
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version
      - run: pnpm install
      - run: pnpm compile
      - run: pnpm build:all

      - name: Package builds
        run: |
          cd .output/chrome-mv3 && zip -r "../../emnuke-${VERSION}-chrome.zip" . && cd ../..
          cd .output/firefox-mv2 && zip -r "../../emnuke-${VERSION}-firefox.zip" . && cd ../..
          cd .output/edge-mv3 && zip -r "../../emnuke-${VERSION}-edge.zip" . && cd ../..
          cd .output/safari-mv2 && zip -r "../../emnuke-${VERSION}-safari.zip" . && cd ../..
          cd .output/opera-mv3 && zip -r "../../emnuke-${VERSION}-opera.zip" . && cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            emnuke-*-chrome.zip
            emnuke-*-firefox.zip
            emnuke-*-edge.zip
            emnuke-*-safari.zip
            emnuke-*-opera.zip

      - name: Submit to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: emnuke-${{ env.VERSION }}-chrome.zip
          extension-id: biiccplhgoolppceidodpgifbhimgngo
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Submit to Firefox AMO
        run: |
          npx web-ext sign \
            --source-dir .output/firefox-mv2/ \
            --channel listed \
            --api-key "${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret "${{ secrets.AMO_JWT_SECRET }}" \
            || echo "::warning::AMO submission exited with $? (expected for listed channel)"
