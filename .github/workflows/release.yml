name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm compile
      - run: pnpm build:all

      - name: Package builds
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd .output/chrome-mv3 && zip -r "../../emnuke-${VERSION}-chrome.zip" . && cd ../..
          cd .output/firefox-mv2 && zip -r "../../emnuke-${VERSION}-firefox.zip" . && cd ../..
          cd .output/edge-mv3 && zip -r "../../emnuke-${VERSION}-edge.zip" . && cd ../..
          cd .output/safari-mv2 && zip -r "../../emnuke-${VERSION}-safari.zip" . && cd ../..
          cd .output/opera-mv3 && zip -r "../../emnuke-${VERSION}-opera.zip" . && cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            emnuke-*-chrome.zip
            emnuke-*-firefox.zip
            emnuke-*-edge.zip
            emnuke-*-safari.zip
            emnuke-*-opera.zip

      - name: Submit to Firefox AMO
        continue-on-error: true
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npx wxt submit \
            --firefox-zip "emnuke-${VERSION}-firefox.zip" \
            --firefox-extension-id "extension@emnuke.com" \
            --firefox-jwt-issuer "${{ secrets.AMO_JWT_ISSUER }}" \
            --firefox-jwt-secret "${{ secrets.AMO_JWT_SECRET }}"
