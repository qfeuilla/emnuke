name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm compile
      - run: pnpm build:all

      # Package each build as a zip with a clean name
      - name: Package builds
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd .output/chrome-mv3 && zip -r "../../emnuke-${VERSION}-chrome.zip" . && cd ../..
          cd .output/firefox-mv2 && zip -r "../../emnuke-${VERSION}-firefox.zip" . && cd ../..
          cd .output/edge-mv3 && zip -r "../../emnuke-${VERSION}-edge.zip" . && cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            emnuke-*-chrome.zip
            emnuke-*-firefox.zip
            emnuke-*-edge.zip
